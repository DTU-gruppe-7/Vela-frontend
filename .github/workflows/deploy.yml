name: Deploy Frontend til Debian

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # RET DETTE TIL DIT BRUGERNAVN (med små bogstaver)
  IMAGE_NAME: dtu-gruppe-7/vela-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy til Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/vela
            
            # Hent det nye image og genstart KUN frontend og proxy containerne
            docker compose pull frontend
            docker compose up -d frontend proxy