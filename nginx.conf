server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Dette er magien der sikrer at React (Single Page Application)
        # kan håndtere URL'er uden at få en 404 fejl på serveren.
        try_files $uri $uri/ /index.html;
    }

    # Frivilligt: Gør cache af statiske filer mere effektivt
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}